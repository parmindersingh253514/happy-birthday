<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #e0f7fa; /* Soft blue */
            padding: 20px;
        }
        h1 { color: #006064; }
        h2 { color: #00838f; }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }
        .gallery img {
            width: 200px; /* Reduced width */
            height: 250px; /* Fixed height to make them all match */
            object-fit: cover; /* This stops the photos from looking stretched */
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <h1>Happy Birthday Bhabi g </h1>
    <h2>Stay happy, live long. God full fill your every wish lot of good luck best wishes from your young brother 🎂✨</h2>
    
    <div class="gallery">
        <img src="pic.jpeg">
        <img src="pic2.jpeg">
        <img src="pic3.jpeg">
        <img src="pic4.jpeg">
    </div>

</body>
</html>
